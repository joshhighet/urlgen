<body class="light-theme">
  <header>
    <h1>urlgen: the search engine engine</h1>
    <div class="header-actions">
      <button id="helpToggle" class="help-button" aria-label="Show keyboard shortcuts" title="Keyboard shortcuts">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke="currentColor" stroke-width="2"/>
          <line x1="12" y1="17" x2="12.01" y2="17" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button id="themeToggle" aria-label="Toggle dark mode">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
    </div>
  </header>
  <div class="filters">
    <div id="categoryFilter"></div>
    <div class="filter-item">
      <input type="text" id="providerFilter" placeholder="Filter providers by name...">
    </div>
    <div id="providerCount" class="provider-count"></div>
  </div>
  
  <div id="helpTooltip" class="help-tooltip hidden">
    <div class="tooltip-content">
      <div class="shortcut-group">
        <span class="shortcut-key">/</span>
        <span class="shortcut-desc">Focus search</span>
      </div>
      <div class="shortcut-group">
        <span class="shortcut-key">⌘F</span>
        <span class="shortcut-desc">Filter providers</span>
      </div>
      <div class="shortcut-group">
        <span class="shortcut-key">0</span>
        <span class="shortcut-desc">Show all</span>
      </div>
      <div class="shortcut-group">
        <span class="shortcut-key">1-7</span>
        <span class="shortcut-desc">Select category</span>
      </div>
      <div class="shortcut-group">
        <span class="shortcut-key">⌫</span>
        <span class="shortcut-desc">Clear filters</span>
      </div>
    </div>
  </div>
  <form id="searchForm">
    <input type="text" id="searchInput" placeholder="Enter IP, domain, email, or hash to search...">
  </form>
  <div id="providerContainer"></div>
  <div id="loading" class="spinner hidden"></div>
  <script src="script.js"></script>
</body>
